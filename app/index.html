<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette Picker</title>
  </head>
  <body>
    <main>
      <h1>Palette Picker</h1>
      <form action="">
        <h2>Add a Palette</h2>
        <label for="title"
          >Palette Title:
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Your Title Here"
        /></label>
        <label for="color1"
          >Color #1: <input type="color" name="color1" id="color1"
        /></label>
        <label for="color2"
          >Color #2: <input type="color" name="color2" id="color2"
        /></label>
        <label for="color3"
          >Color #3: <input type="color" name="color3" id="color3"
        /></label>
        <fieldset>
          <legend>Temperature</legend>
          <label for="warm"
            ><input type="radio" name="temperature" id="warm" />Warm</label
          >
          <label for="neutral"
            ><input
              type="radio"
              name="temperature"
              id="neutral"
            />Neutral</label
          >
          <label for="cool"
            ><input type="radio" name="temperature" id="cool" />Cool</label
          >
        </fieldset>
      </form>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
