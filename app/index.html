<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- favicon -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palette Picker</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Palette Picker</h1>
      </header>
      <!-- MAKE SURE IDS ARE DEFINED-->
      <!-- form for creating palettes-->
      <form id="palette-form">
        <label for="title"
          >Palette Title <input type="text" id="title" required
        /></label>

        <!--Color inputs-->
        <label for="color1">Color #1 <input type="color" id="color1" /></label>
        <label for="color2">Color #2 <input type="color" id="color2" /></label>
        <label for="color3">Color #3 <input type="color" id="color3" /></label>

        <!--temperature setting-->
        <fieldset>
          <legend>Temperature</legend>

          <label for="warm"
            ><input type="radio" name="temperature" value="warm" />Warm</label
          >
          <label for="neutral"
            ><input
              type="radio"
              name="temperature"
              value="neutral"
              checked
            />Neutral</label
          >
          <label for="cool"
            ><input type="radio" name="temperature" value="cool" />Cool</label
          >
        </fieldset>
        <!--Submit button-->
        <button type="submit">Create Palette</button>
      </form>

      <!--Section-->
      <section id="palettes" aria-labelledby="saved-palettes">
        <h2>Your Palettes</h2>
        <div class="palette-container">
          <!-- Add Palette through JS Here-->
        </div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
